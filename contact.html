<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>jdigitalarchitecture — Contact</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#111111">
<style>
  body{font-family:Inter,sans-serif;background:#f5f5f7;color:#1d1d1f}
  .glass{background:rgba(255,255,255,.7);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,.3)}
  .btn{display:inline-block;padding:12px 28px;border-radius:14px;font-weight:500;cursor:pointer;text-decoration:none;transition:transform .08s}
  .btn-primary{background:#1d1d1f;color:#fff;box-shadow:0 6px 18px rgba(29,29,31,.12)}
  .btn-primary:hover{transform:translateY(-2px)}
</style>
</head>
<body class="min-h-screen flex flex-col">
<header class="fixed w-full z-50 px-4 py-3">
  <div class="max-w-7xl mx-auto flex justify-between items-center glass rounded-2xl px-5 py-2.5 shadow-sm">
    <a href="index.html" class="flex items-center gap-2 group" aria-label="Home">
      <img src="assets/logo.svg" alt="" class="w-8 h-8 md:w-10 md:h-10 transition-transform group-hover:scale-110"/>
      <span class="sr-only">Joe Dev</span>
    </a>
    <nav class="hidden md:flex space-x-6 font-medium text-sm">
      <a href="index.html" class="hover:text-blue-600 transition">Home</a>
      <a href="about.html" class="hover:text-blue-600 transition">About</a>
      <a href="services.html" class="hover:text-blue-600 transition">Services</a>
      <a href="contact.html" class="hover:text-blue-600 transition">Contact</a>
    </nav>
    <a href="contact.html" class="btn btn-primary text-xs md:text-sm px-4 py-2">Hire Me</a>
  </div>
</header>
<main class="flex-1 py-12 px-6 flex items-center justify-center">
  <div class="glass rounded-3xl p-8 md:p-12 max-w-md w-full text-center">
    <h2 class="text-2xl font-bold mb-2">Ready to build something great?</h2>
    <p class="text-slate-500 mb-6">Let’s discuss your next project.</p>
    <form class="space-y-3" action="#" method="POST" data-netlify="true" name="contact" netlify>
      <input type="hidden" name="bot-field" />
      <input class="w-full px-4 py-2 rounded-xl border border-slate-200 bg-white outline-none" name="name" placeholder="Your name" required/>
      <input class="w-full px-4 py-2 rounded-xl border border-slate-200 bg-white outline-none" name="email" type="email" placeholder="Email" required/>
      <textarea class="w-full px-4 py-2 rounded-xl border border-slate-200 bg-white outline-none h-24" name="message" placeholder="Tell us about your project" required></textarea>
      <input type="hidden" name="form-name" value="contact" />
      <button class="btn btn-primary w-full" type="submit">Send Message</button>
    </form>
    <p class="mt-6 text-sm text-slate-400">or email hello@joe.dev</p>
  </div>
</main>
<footer class="bg-slate-900 text-white py-12 mt-20 relative z-10">
  <div class="max-w-6xl mx-auto text-center px-4">
    <p class="text-slate-500 text-sm">© 2026 jdigitalarchitecture</p>
  </div>
</footer>
<script src="js/app.js"></script>
</body></html>
